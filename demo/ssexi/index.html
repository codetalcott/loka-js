<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>loka-js + ssexi (es)</title>

<!-- Load order: orchestrator → locales → ssexi → fixi -->
<script src="../../orchestrator.js"></script>
<script src="../../locales/es.js"></script>
<script src="../../ssexi.js"></script>
<script src="../../fixi.js"></script>

<style>
  body { font: 14px system-ui, sans-serif; padding: 1.5rem; max-width: 40rem; }
  button { padding: .5rem 1rem; cursor: pointer; margin-right: .5rem; }
  #stream { background: #f4f4f4; padding: .75rem; border-radius: 4px; min-height: 4rem; }
  .row { padding: .25rem 0; }
</style>
</head>
<body>

<h1>ssexi · eventos SSE en español</h1>

<p>
  ssexi dispara eventos <code>fx:sse:open</code>, <code>fx:sse:message</code>,
  <code>fx:sse:swapped</code>, <code>fx:sse:close</code> y <code>fx:sse:error</code>.
  loka añade los alias en español
  (<code>fx:sse:abrir</code>, <code>fx:sse:mensaje</code>, <code>fx:sse:intercambiado</code>,
  <code>fx:sse:cerrar</code>) — los listeners en cualquier idioma reciben los datos.
</p>

<button id="simulate">Simular mensaje SSE</button>

<div id="stream"></div>

<script>
  // Listen for the SPANISH alias — the orchestrator re-fires it when ssexi
  // dispatches the canonical English event.
  document.getElementById('stream').addEventListener('fx:sse:mensaje', (e) => {
    const row = document.createElement('div')
    row.className = 'row'
    row.textContent = `[${new Date().toLocaleTimeString()}] mensaje: ${e.detail?.message?.data ?? '(sin datos)'}`
    e.target.appendChild(row)
  })

  // Simulate ssexi firing the canonical event (no real SSE server in this demo).
  document.getElementById('simulate').addEventListener('click', () => {
    const stream = document.getElementById('stream')
    let i = (stream.dataset.counter = String(+(stream.dataset.counter || 0) + 1))
    stream.dispatchEvent(new CustomEvent('fx:sse:message', {
      detail: { message: { data: `tick ${i}` } },
      bubbles: true, cancelable: true, composed: true,
    }))
  })
</script>

</body>
</html>
