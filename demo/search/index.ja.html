<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Fixi Project — loka-js M2.5 デモ</title>
<link rel="stylesheet" href="search.css">

<!-- loka-js オーケストレーターが window.fixi.{name,event,sel} フックを設定。
     パッチ済み fixi は fx-アクション、fx-ターゲット 等を DOM 変更なしで読む。 -->
<script src="../../orchestrator.js"></script>
<script src="../../locales/ja.js"></script>

<!-- moxi → fixi の順 (fixiproject 規約): moxi が fx:init / fx:process の
     リスナーを fixi の DOMContentLoaded ディスパッチより前に登録するため。 -->
<script src="https://cdn.jsdelivr.net/gh/bigskysoftware/moxi@6760e60/moxi.js"></script>
<script src="../../fixi.js"></script>
</head>
<body>

<header class="top">
  <button class="toggle" on-click="document.body.classList.toggle('sidebar-collapsed')" aria-label="サイドバーの開閉">☰</button>
  <h1>Fixi Project</h1>
  <nav class="locales" aria-label="言語">
    <a href="index.en.html">EN</a>
    <a href="index.es.html">ES</a>
    <a href="index.ja.html" class="current">JA</a>
    <a href="index.ar.html">AR</a>
  </nav>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="search">
      <input type="search" placeholder="ドキュメント検索..."
        on-input="let v = event.target.value.toLowerCase(); for (let li of q('.doc-item')) li.hidden = v &amp;&amp; !li.textContent.toLowerCase().includes(v);">
    </div>
    <ul class="doc-list">
      <li class="doc-item"><button fx-アクション="docs/about.html" fx-ターゲット="#content" fx-スワップ="innerHTML">概要</button></li>
      <li class="doc-item"><button fx-アクション="docs/tour.html"  fx-ターゲット="#content" fx-スワップ="innerHTML">ライブラリ</button></li>
      <li class="doc-item"><button fx-アクション="docs/fixi.html"  fx-ターゲット="#content" fx-スワップ="innerHTML">fixi.js</button></li>
      <li class="doc-item"><button fx-アクション="docs/moxi.html"  fx-ターゲット="#content" fx-スワップ="innerHTML">moxi.js</button></li>
      <li class="doc-item"><button fx-アクション="docs/paxi.html"  fx-ターゲット="#content" fx-スワップ="innerHTML">paxi.js</button></li>
      <li class="doc-item"><button fx-アクション="docs/ssexi.html" fx-ターゲット="#content" fx-スワップ="innerHTML">ssexi.js</button></li>
      <li class="doc-item"><button fx-アクション="docs/rexi.html"  fx-ターゲット="#content" fx-スワップ="innerHTML">rexi.js</button></li>
      <li class="doc-item"><button fx-アクション="docs/demos.html" fx-ターゲット="#content" fx-スワップ="innerHTML">デモ</button></li>
    </ul>
  </aside>

  <main class="content" id="content">
    <p class="placeholder">サイドバーからドキュメントを選択して、ここで読んでください。</p>
  </main>
</div>

</body>
</html>
