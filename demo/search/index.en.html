<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Fixi Project — loka-js M2.5 demo</title>
<link rel="stylesheet" href="search.css">

<!-- loka-js orchestrator + locales (English is canonical but loaded for parity) -->
<script src="../../orchestrator.js"></script>
<script src="../../locales/en.js"></script>

<!-- Family processors: patched fixi (3-hook contract) + upstream moxi (canonical English handlers) -->
<script src="../../fixi.js"></script>
<script src="https://cdn.jsdelivr.net/gh/bigskysoftware/moxi@6760e60/moxi.js"></script>
</head>
<body>

<header class="top">
  <button class="toggle" on-click="document.body.classList.toggle('sidebar-collapsed')" aria-label="Toggle sidebar">☰</button>
  <h1>The Fixi Project</h1>
  <nav class="locales" aria-label="Language">
    <a href="index.en.html" class="current">EN</a>
    <a href="index.es.html">ES</a>
    <a href="index.ja.html">JA</a>
    <a href="index.ar.html">AR</a>
  </nav>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="search">
      <input type="search" placeholder="Search docs..."
        on-input="let v = event.target.value.toLowerCase(); for (let li of q('.doc-item')) li.hidden = v &amp;&amp; !li.textContent.toLowerCase().includes(v);">
    </div>
    <ul class="doc-list">
      <li class="doc-item"><button fx-action="docs/about.html" fx-target="#content" fx-swap="innerHTML">About</button></li>
      <li class="doc-item"><button fx-action="docs/tour.html"  fx-target="#content" fx-swap="innerHTML">The Libraries</button></li>
      <li class="doc-item"><button fx-action="docs/fixi.html"  fx-target="#content" fx-swap="innerHTML">fixi.js</button></li>
      <li class="doc-item"><button fx-action="docs/moxi.html"  fx-target="#content" fx-swap="innerHTML">moxi.js</button></li>
      <li class="doc-item"><button fx-action="docs/paxi.html"  fx-target="#content" fx-swap="innerHTML">paxi.js</button></li>
      <li class="doc-item"><button fx-action="docs/ssexi.html" fx-target="#content" fx-swap="innerHTML">ssexi.js</button></li>
      <li class="doc-item"><button fx-action="docs/rexi.html"  fx-target="#content" fx-swap="innerHTML">rexi.js</button></li>
      <li class="doc-item"><button fx-action="docs/demos.html" fx-target="#content" fx-swap="innerHTML">Demos</button></li>
    </ul>
  </aside>

  <main class="content" id="content">
    <p class="placeholder">Select a doc from the sidebar to read it here.</p>
  </main>
</div>

</body>
</html>
