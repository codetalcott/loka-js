<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>مشروع Fixi — عرض loka-js M2.5</title>
<link rel="stylesheet" href="search.css">

<!-- منسّق loka-js يثبت window.fixi.{name,event,sel} حتى يقرأ fixi المعدَّل
     أسماء fx-إجراء و fx-هدف وغيرها مباشرة دون تعديل DOM. -->
<script src="../../orchestrator.js"></script>
<script src="../../locales/ar.js"></script>

<script src="../../fixi.js"></script>
<script src="https://cdn.jsdelivr.net/gh/bigskysoftware/moxi@6760e60/moxi.js"></script>
</head>
<body>

<header class="top">
  <button class="toggle" on-click="document.body.classList.toggle('sidebar-collapsed')" aria-label="تبديل الشريط الجانبي">☰</button>
  <h1>مشروع Fixi</h1>
  <nav class="locales" aria-label="اللغة">
    <a href="index.en.html">EN</a>
    <a href="index.es.html">ES</a>
    <a href="index.ja.html">JA</a>
    <a href="index.ar.html" class="current">AR</a>
  </nav>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="search">
      <input type="search" placeholder="البحث في المستندات..."
        on-input="let v = event.target.value.toLowerCase(); for (let li of q('.doc-item')) li.hidden = v &amp;&amp; !li.textContent.toLowerCase().includes(v);">
    </div>
    <ul class="doc-list">
      <li class="doc-item"><button fx-إجراء="docs/about.html" fx-هدف="#content" fx-تبديل="innerHTML">نظرة عامة</button></li>
      <li class="doc-item"><button fx-إجراء="docs/tour.html"  fx-هدف="#content" fx-تبديل="innerHTML">المكتبات</button></li>
      <li class="doc-item"><button fx-إجراء="docs/fixi.html"  fx-هدف="#content" fx-تبديل="innerHTML">fixi.js</button></li>
      <li class="doc-item"><button fx-إجراء="docs/moxi.html"  fx-هدف="#content" fx-تبديل="innerHTML">moxi.js</button></li>
      <li class="doc-item"><button fx-إجراء="docs/paxi.html"  fx-هدف="#content" fx-تبديل="innerHTML">paxi.js</button></li>
      <li class="doc-item"><button fx-إجراء="docs/ssexi.html" fx-هدف="#content" fx-تبديل="innerHTML">ssexi.js</button></li>
      <li class="doc-item"><button fx-إجراء="docs/rexi.html"  fx-هدف="#content" fx-تبديل="innerHTML">rexi.js</button></li>
      <li class="doc-item"><button fx-إجراء="docs/demos.html" fx-هدف="#content" fx-تبديل="innerHTML">عروض</button></li>
    </ul>
  </aside>

  <main class="content" id="content">
    <p class="placeholder">اختر مستندًا من الشريط الجانبي لقراءته هنا.</p>
  </main>
</div>

</body>
</html>
